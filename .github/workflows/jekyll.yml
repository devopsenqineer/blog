name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      # Debug-Informationen
      - name: Debug Info
        run: |
          echo "Ruby version:"
          ruby -v
          echo "Bundler version:"
          bundle -v
          echo "Jekyll version:"
          bundle exec jekyll -v
          echo "Working directory contents:"
          ls -la
          echo "Gemfile contents:"
          cat Gemfile

      # Explizite Installation der benötigten Gems
      - name: Install dependencies
        run: |
          bundle config path vendor/bundle
          bundle install

      # Build mit detaillierten Ausgaben
      - name: Build with Jekyll
        run: |
          bundle exec jekyll build --trace
          echo "Contents of _site directory:"
          ls -la _site/
        env:
          JEKYLL_ENV: production

      # Explizites Upload mit spezifischem Artifact-Namen
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
          name: github-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
        with:
          artifact_name: github-pages
