name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # Gemfile verifizieren
      - name: Verify Gemfile
        run: |
          echo "Gemfile contents:"
          cat Gemfile
          echo "Ruby version:"
          ruby -v
          echo "Bundler version:"
          bundle -v

      # Dependencies installieren
      - name: Install dependencies
        run: |
          rm -f Gemfile.lock
          bundle install

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      # Jekyll Build
      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      # Verify Build
      - name: Verify Build
        run: |
          echo "Contents of _site directory:"
          ls -la _site/
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
