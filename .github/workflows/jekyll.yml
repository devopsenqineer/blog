name: Build and Deploy Jekyll Site
on:
  push:
    branches: [ main, master ]  # Führt den Workflow bei Pushes auf main oder master aus
  workflow_dispatch:  # Erlaubt manuelles Auslösen des Workflows

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04  # Nutzt die stabile Ubuntu-Version
    permissions:
      contents: write  # Notwendig für Deployment auf GitHub Pages
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true  # Cached gemfile dependencies
          
      - name: Setup Jekyll
        run: |
          gem install bundler
          bundle install
          
      - name: Build Site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site  # Der Ordner mit den generierten Dateien
          publish_branch: gh-pages  # Branch für GitHub Pages
          enable_jekyll: false  # Jekyll wird bereits im Build-Schritt ausgeführt
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: ${{ github.event.head_commit.message }}
          force_orphan: true  # Hält den gh-pages Branch sauber
